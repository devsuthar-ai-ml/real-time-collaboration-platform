version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: rtc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: collab_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d collab_db']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: rtc_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/collab_db?schema=public
      JWT_SECRET: replace-with-a-strong-secret
      JWT_EXPIRES_IN: 1d
      CORS_ORIGIN: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '4000:4000'

  frontend:
    build:
      context: ./frontend
    container_name: rtc_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  postgres_data:
